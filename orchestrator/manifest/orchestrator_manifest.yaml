# =============================================================================
# orchestrator_manifest.yaml — Orchestrator Agent
# Routes user requests to the IGA Incident Analysis Agent.
# Swap in via: ORCHESTRATOR_MODE=true
# Version schema: v1.0
# =============================================================================

# -----------------------------------------------------------------------------
# IDENTITY
# -----------------------------------------------------------------------------
identity:
  agent_id: "orchestrator_001"
  name: "orchestrator"
  display_name: "Orchestrator Agent"
  description: >
    Routes user requests to the IGA Incident Analysis specialist agent.
    Delegates all incident-related queries and aggregates responses.
  owner:
    team: "quantum-team"
    email: "quantum@company.com"
  version: "1.0.0"
  status: "active"


# -----------------------------------------------------------------------------
# INSTRUCTION
# -----------------------------------------------------------------------------
instruction: |
  You are an intelligent assistant with access to a set of specialist agents.
  You route user requests to the right agent — but you can also respond directly
  to greetings, meta questions, and capability questions without calling any tool.

  {agent_routing_block}

  WHEN TO RESPOND DIRECTLY (no tool call needed):
  - Greetings ("hi", "hello", "hey") → respond warmly and summarise what you can help with
  - Capability questions ("what can you do?", "how can you help?") → list what each agent handles
  - Unclear or very short messages → ask the user to clarify what they need

  WHEN TO ROUTE (call the appropriate agent tool):
  - Any specific domain request → route to the most relevant agent
  - If no agent is relevant, politely tell the user what you can and cannot help with

  STRICT RULES:
  - NEVER fabricate domain data (incidents, web content) yourself — always route those
  - When routing, never mention agent names, tool names, transfers, or handoffs
  - Present routed responses as if they came from you directly

  GREETING RESPONSE FORMAT:
  When greeting, introduce yourself briefly and list capabilities in plain language.
  Example: "Hi! I can help you with [X] and [Y]. What would you like to do?"


# -----------------------------------------------------------------------------
# MODEL
# -----------------------------------------------------------------------------
model:
  base_model_id: "gemini-2.5-flash"
  base_model_source: "google_ai_studio"
  inference:
    temperature: 0.1
    max_output_tokens: 4096
    top_p: 0.9


# -----------------------------------------------------------------------------
# CAPABILITIES
# Sub-agents are NOT declared here. They are auto-discovered at startup by
# orchestrator.py — every *_manifest.yaml in this folder (except this file)
# is loaded as a specialist sub-agent automatically.
# -----------------------------------------------------------------------------
capabilities:
  modalities:
    input: ["text"]
    output: ["text"]

  tools: []


# -----------------------------------------------------------------------------
# POLICY
# -----------------------------------------------------------------------------
policy:
  confidence_threshold: 0.7
  denied_problem_types: []
  rate_limits:
    requests_per_minute: 30
    max_concurrent_sessions: 5


# -----------------------------------------------------------------------------
# DEPLOYMENT
# -----------------------------------------------------------------------------
deployment:
  lifecycle:
    max_turns: 20
    session_timeout_seconds: 300
    graceful_shutdown_seconds: 30
