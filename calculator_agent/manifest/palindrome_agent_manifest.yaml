# =============================================================================
# palindrome_agent_manifest.yaml — Palindrome Inspector Agent Manifest
# Version schema: v1.0
# =============================================================================

# -----------------------------------------------------------------------------
# IDENTITY
# -----------------------------------------------------------------------------
identity:
  agent_id: "palindrome_agent_001"
  name: "palindrome_agent"
  display_name: "Palindrome Inspector"
  description: >
    Inspects and analyses text for palindromic properties. Checks if text is a
    palindrome, finds the longest palindromic substring, makes words into
    palindromes, and scores how close text is to being a palindrome.
  owner:
    team: "quantum-team"
    email: "quantum@company.com"
  version: "1.0.0"
  status: "draft"


# -----------------------------------------------------------------------------
# INSTRUCTION
# System prompt — single source of truth for agent behaviour
# -----------------------------------------------------------------------------
instruction: |
  You are a precise and helpful palindrome inspector agent.
  Your job is to analyse text for palindromic properties and explain your findings clearly.

  CAPABILITIES:
  - Check if a word or sentence is a palindrome (ignoring case, spaces, and punctuation)
  - Find the longest palindromic substring within a piece of text
  - Extend a word by appending the minimum number of characters to make it a palindrome
  - Score how close any text is to being a palindrome on a 0–100 scale

  RULES:
  - Always explain what normalisation was applied (e.g. case folding, punctuation removal)
  - Show the cleaned version of the input when it differs from the raw input
  - If asked to do arithmetic or anything unrelated to text/palindromes → escalate
  - If you are not confident in the result → escalate, never guess
  - Always give a clear final answer

  TONE:
  - Be clear and educational
  - Explain why something is or is not a palindrome, not just whether it is


# -----------------------------------------------------------------------------
# MODEL
# -----------------------------------------------------------------------------
model:
  base_model_id: "gemini-2.5-flash"
  base_model_source: "google_ai_studio"
  inference:
    temperature: 0.1
    max_output_tokens: 1024
    top_p: 0.9


# -----------------------------------------------------------------------------
# CAPABILITIES
# -----------------------------------------------------------------------------
capabilities:
  modalities:
    input: ["text"]
    output: ["text"]

  tools:
    - tool_id: "is_palindrome"
      display_name: "Palindrome Checker"
      description: "Checks if a word or sentence is a palindrome (ignores case, spaces, punctuation)."
      type: "function"
      allowed: true

    - tool_id: "longest_palindrome_substring"
      display_name: "Longest Palindrome Substring Finder"
      description: "Finds the longest palindromic substring within the given text."
      type: "function"
      allowed: true

    - tool_id: "make_palindrome"
      display_name: "Palindrome Maker"
      description: "Appends the minimum number of characters to a word to make it a palindrome."
      type: "function"
      allowed: true

    - tool_id: "palindrome_score"
      display_name: "Palindrome Scorer"
      description: "Scores how close text is to being a palindrome on a 0–100 scale."
      type: "function"
      allowed: true

    - tool_id: "escalate"
      display_name: "Escalation Tool"
      description: "Routes out-of-scope or low-confidence problems to human review."
      type: "human_in_loop"
      allowed: true


# -----------------------------------------------------------------------------
# POLICY
# -----------------------------------------------------------------------------
policy:
  confidence_threshold: 0.7

  allowed_problem_types:
    - "palindrome_check"
    - "substring_analysis"
    - "text_transformation"
    - "text_scoring"

  denied_problem_types:
    - "arithmetic"
    - "code_execution"
    - "image_analysis"

  escalation:
    enabled: true
    trigger_on_low_confidence: true
    trigger_on_denied_problem_type: true
    escalation_message: "Problem is out of scope or confidence is too low. Routing to human review."

  rate_limits:
    requests_per_minute: 30
    max_concurrent_sessions: 5

  allowed_callers:
    - "any"


# -----------------------------------------------------------------------------
# OBSERVABILITY
# -----------------------------------------------------------------------------
observability:
  logging:
    enabled: true
    log_level: "INFO"
    log_tool_calls: true
    log_escalations: true
    redact_pii: false

  metrics:
    enabled: true
    track:
      - name: "tool_call_count"
        description: "How many times each tool was called"
      - name: "escalation_rate"
        description: "Fraction of problems escalated to human"
      - name: "confidence_score"
        description: "Distribution of confidence scores per request"
      - name: "response_latency_ms"
        description: "End to end response time in milliseconds"

  alerts:
    - name: "high_escalation_rate"
      metric: "escalation_rate"
      threshold: 0.3
      message: "Too many problems being escalated — review agent coverage"


# -----------------------------------------------------------------------------
# DEPLOYMENT
# -----------------------------------------------------------------------------
deployment:
  targets:
    - environment: "local"
      runtime: "adk_web"

    - environment: "staging"
      runtime: "cloud_run"
      region: "us-central1"

    - environment: "production"
      runtime: "cloud_run"
      region: "us-central1"

  canary:
    enabled: false
    initial_traffic_pct: 10
    increment_pct: 20
    rollback_on_failure: true

  lifecycle:
    max_turns: 20
    session_timeout_seconds: 300
    graceful_shutdown_seconds: 30
